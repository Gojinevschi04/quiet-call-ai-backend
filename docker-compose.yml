services:
  qc_postgres:
    container_name: qc_postgres
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASS:-pass}
      POSTGRES_DB: ${DB_NAME:-app_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quiet_call_net

  qc_api:
    container_name: qc_api
    build:
      context: .
      target: base
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: qc_postgres
      DB_PORT: 5432
    volumes:
      - app_storage:/app/storage
    depends_on:
      qc_postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-server-header"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - quiet_call_net

  qc_worker:
    container_name: qc_worker
    build:
      context: .
      target: base
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: qc_postgres
      DB_PORT: 5432
    volumes:
      - app_storage:/app/storage
    depends_on:
      qc_postgres:
        condition: service_healthy
    command: python -m app.worker
    networks:
      - quiet_call_net

  qc_test:
    container_name: qc_test
    build:
      context: .
      target: test
    env_file:
      - .env
    environment:
      DB_HOST: qc_postgres
      DB_PORT: 5432
    depends_on:
      qc_postgres:
        condition: service_healthy
    command: pytest --tb=short -v
    profiles:
      - test
    networks:
      - quiet_call_net

volumes:
  postgres_data:
  app_storage:

networks:
  quiet_call_net:
    driver: bridge
